<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的云端代码编辑器</title>
    <style>
        /* 移除默认边距，让编辑器撑满全屏 */
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #1e1e1e; }
        #editor-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="editor-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    
    <script>
        // 配置 Monaco Editor 的核心文件从 CDN 加载
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

        // 加载编辑器主模块
        require(['vs/editor/editor.main'], function() {
            var editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: [
                    '// 欢迎来到云端编辑器',
                    'function helloWorld() {',
                    '\tconsole.log("Hello, Tablet!");',
                    '}',
                    'helloWorld();'
                ].join('\n'),
                language: 'javascript', // 默认语言
                theme: 'vs-dark',       // 暗色主题
                automaticLayout: true,  // 自动布局（关键：平板屏幕旋转时能自动适应）
                fontSize: 16,           // 平板上字号稍微调大一点
                minimap: { enabled: false } // 在平板上建议关闭右侧缩略图以节省空间
            });
        });
    </script>
</body>
</html>
